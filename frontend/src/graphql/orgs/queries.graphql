query adminOrganization($orgId: ID!) {
  organization(id: $orgId) {
    ...AdminOrganization
  }
}

query memberships($organizationId: ID!) {
  memberships(organizationId: $organizationId) {
    ...Membership
  }
}

query allOrganizationsForAdminEdit($search: String) {
  allOrganizations(search: $search) {
    id
    name
    slug
    primaryGroup {
      id
      name
      uuid
    }
    hrGroup {
      id
      name
      uuid
    }
    permissionGroups {
      id
      uuid
      name
      groupType
    }
  }
}

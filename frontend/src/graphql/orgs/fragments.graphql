fragment AdminOrganization on OrganizationType {
  id
  name
  hrGroup {
    id
    uuid
  }
  primaryGroup {
    id
    uuid
  }
  events {
    ...OrgAdminEvent
  }
  listings {
    ...OrgAdminListing
  }
}

fragment OrgAdminEvent on EventType {
  id
  title
  startTime
  shortDescription
  availableSlots
  isFull
  usersAttending {
    id
  }
}

fragment OrgAdminListing on ListingType {
  id
  title
  deadline
}

fragment Membership on MembershipType {
  id
  user {
    id
    username
    firstName
    lastName
  }
  group {
    id
    name
    uuid
  }
}

query user {
  user {
    ...User
  }
}

query userWithEventsAndOrgs {
  user {
    ...UserWithEventsAndOrgs
  }
}

query userToEdit {
  user {
    ...UserToEdit
  }
}

query adminEditCapabilities {
  canManageUserProfiles
  canManageUserNfc
}

query nfcUserSearch($query: String!, $limit: Int) {
  nfcUserSearch(query: $query, limit: $limit) {
    id
    username
    firstName
    lastName
    feideEmail
    nfcUidHex
    nfcPinCode
    nfcPermanentAccess
  }
}

query userSearch($query: String!, $limit: Int) {
  userSearch(query: $query, limit: $limit) {
    id
    username
    firstName
    lastName
    email
    phoneNumber
    allergies
    graduationYear
    gradeYear
    dateJoined
    lastLogin
    feideUserid
    feideEmail
    nfcUidHex
    nfcPinCode
    nfcPermanentAccess
  }
}

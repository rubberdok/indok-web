fragment User on UserType {
  id
  feideEmail
  email
  username
  firstName
  lastName
  dateJoined
  graduationYear
  gradeYear
  allergies
  phoneNumber
  firstLogin
}

fragment UserWithEventsAndOrgs on UserType {
  ...User
  events {
    id
  }
  organizations {
    id
    name
  }
}

fragment UserToEdit on UserType {
  id
  username
  firstName
  lastName
  phoneNumber
  allergies
  email
  graduationYear
  firstLogin
  feideEmail
  canUpdateYear
  yearUpdatedAt
  nfcUidHex
  nfcPinCode
  nfcPermanentAccess
}

fragment UserAdminEdit on UserType {
  ...UserToEdit
  feideUserid
  gradeYear
  dateJoined
  lastLogin
}

fragment UserNfcSearch on UserType {
  id
  username
  firstName
  lastName
  feideEmail
  nfcUidHex
  nfcPinCode
  nfcPermanentAccess
}

fragment UserAdminSearch on UserType {
  ...UserNfcSearch
  email
  phoneNumber
  allergies
  graduationYear
  gradeYear
  dateJoined
  lastLogin
  feideUserid
}

fragment UserOrganization on OrganizationType {
  id
  name
  slug
  logoUrl
  color
  description
}

mutation logout {
  logout {
    idToken
  }
}

mutation authUser($code: String!) {
  authUser(code: $code) {
    user {
      ...User
    }
  }
}

mutation updateUser($userData: UserInput) {
  updateUser(userData: $userData) {
    user {
      ...User
    }
  }
}

mutation adminUpdateUser($userId: ID!, $userData: AdminUserInput!) {
  adminUpdateUser(userId: $userId, userData: $userData) {
    user {
      ...UserToEdit
      feideUserid
      gradeYear
      dateJoined
      lastLogin
    }
  }
}

mutation adminUpdateUserNfc($userId: ID!, $nfcData: AdminUserNfcInput!) {
  adminUpdateUserNfc(userId: $userId, nfcData: $nfcData) {
    user {
      ...UserToEdit
      feideUserid
      gradeYear
      dateJoined
      lastLogin
    }
  }
}
